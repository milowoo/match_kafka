# 本地测试专用配置
# 事件日志路径指向系统临时目录
matching.eventlog.dir=/tmp/matching/eventlog-queue
matching.outbox.failure-log-dir=/tmp/matching/failure-log

# 关闭 Apollo，使用本地配置
apollo.bootstrap.enabled=false

# Redis (本地单节点)
spring.redis.cluster.nodes=localhost:7000

# Kafka (本地)
spring.kafka.bootstrap-servers=localhost:9092
matching.kafka.consumer.auto-startup=false

# 高可用配置 (测试环境)
matching.ha.enabled=true
matching.ha.instance-id=test-node-1
matching.ha.role=PRIMARY

# Chronicle Queue 事件日志 (轻量化测试配置)
matching.eventlog.roll-cycle=MINUTELY
matching.eventlog.block-size=1MB
matching.eventlog.snapshot-interval-ms=1000
matching.eventlog.efs-optimized=false

# Chronicle Queue 稳定性配置 (全部关闭以加速测试)
matching.chronicle-queue.stability.enable-stability-checks=false
matching.chronicle-queue.stability.conservative-mode=false
matching.chronicle-queue.preallocation-size-mb=1
matching.chronicle-queue.max-file-size-mb=10

# 日志级别 (更详细，方便调试)
logging.level.com.matching=DEBUG
logging.level.org.springframework.kafka=WARN
logging.level.net.openhft=WARN