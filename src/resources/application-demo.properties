server.port=8080

# Apollo
apollo.bootstrap.enabled=false

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
matching.kafka.consumer.auto-startup=false

# Kafka topics
matching.kafka.topic.trade=TRADE_TOP_SYMBOL
matching.kafka.topic.result=TRADE_MATCH_RESULT
matching.kafka.topic.dlq=TRADE_MATCHING_DLQ
matching.kafka.topic.depth=TRADE_DEPTH_UPDATE
matching.kafka.consumer.group-id=matching-engine

# Chronicle Queue EventLog
matching.eventlog.type=chronicle-queue
matching.eventlog.dir=/tmp/matching/eventlog-queue
matching.eventlog.roll-cycle=HOURLY
matching.eventlog.transaction.enabled=true
matching.eventlog.checkpoint.interval-ms=5000

# HA
matching.ha.instance-id=node-1
matching.ha.role=STANDBY

# Protobuf
matching.depth.use-protobuf=true
matching.outbox.use-protobuf=true
matching.eventlog.use-protobuf=true

# Batch sync
matching.batch.size=500
matching.batch.flush-interval-ms=10

# MatchEngine limits
matching.engine.max-orders=500000
matching.disruptor.ring-buffer-size=4096

# Depth push
matching.depth.snapshot-levels=20
matching.depth.snapshot-interval-ms=5000
matching.depth.async-queue-size=10000
matching.depth.async-threads=2

# Actuator
management.server.port=8081
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.matching=INFO
logging.level.net.openhft.chronicle=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Snowflake
matching.snowflake.machine-id=1