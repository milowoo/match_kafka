# 基础服务配置
server.port=8080

# Apollo 配置
app.id=matching
apollo.bootstrap.enabled=true
apollo.bootstrap.namespaces=application
apollo.meta=http://apollo-meta:8080

# Redis Sentinel配置
spring.redis.sentinel.master=${REDIS_SENTINEL_MASTER:mymaster}
spring.redis.sentinel.nodes=${REDIS_SENTINEL_NODES:localhost:26379,localhost:26380,localhost:26381}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.jedis.pool.max-active=100
spring.redis.jedis.pool.max-idle=50
spring.redis.jedis.pool.min-idle=10

# Kafka 基础配置
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=matching-engine
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.concurrency=4

# Kafka Producer 超时配置
spring.kafka.producer.request-timeout-ms=30000
spring.kafka.producer.delivery-timeout-ms=120000
spring.kafka.producer.retries=3
spring.kafka.producer.retry-backoff-ms=1000

# Kafka Consumer 启动管理
matching.kafka.consumer.auto-startup=true
matching.kafka.consumer.startup-check-interval-ms=10000
matching.kafka.consumer.max-startup-attempts=5
matching.kafka.consumer.startup-delay-ms=5000

# Kafka Topics 定义
matching.kafka.topic.trade=TRADE_TOP_SYMBOL
matching.kafka.topic.result=TRADE_MATCH_RESULT
matching.kafka.topic.dlq=TRADE_MATCHING_DLQ

# Kafka producer reliability 配置
# reliableKafkaTemplate: acks=all, enable.idempotence=true, max.in.flight=5, linger=5ms, batch=64KB, compression=snappy
# fastKafkaTemplate: acks=1, linger=5ms, batch=32KB

matching.kafka.send-timeout-ms=10000
matching.kafka.timeout.request-timeout-ms=30000
matching.kafka.timeout.delivery-timeout-ms=120000
matching.kafka.timeout.retry-backoff-ms=1000
matching.kafka.timeout.sync-send-timeout-ms=15000
matching.kafka.timeout.batch-send-timeout-ms=10000
matching.kafka.timeout.consumer-session-timeout-ms=30000
matching.kafka.timeout.consumer-heartbeat-interval-ms=3000

# Chronicle Queue 事件日志配置
matching.eventlog.dir=/data/matching/eventlog-queue
matching.eventlog.roll-cycle=HOURLY
matching.eventlog.block-size=64MB
matching.eventlog.snapshot-interval-ms=60000

matching.eventlog.network-timeout=30000
matching.eventlog.retry-attempts=3
matching.eventlog.retry-delay=1000
matching.eventlog.read-buffer-size=65536
matching.eventlog.write-buffer-size=65536

matching.eventlog.chronicle.sync-mode=ASYNC
matching.eventlog.chronicle.flush-interval=10
matching.eventlog.chronicle.enable-version-check=true
matching.eventlog.chronicle.health-check=false
matching.eventlog.chronicle.buffer-size=64KB
matching.eventlog.chronicle.forceSync=false

# Chronicle Queue 稳定性配置
matching.chronicle-queue.stability.enable-stability-checks=true
matching.chronicle-queue.stability.enable-version-validation=true
matching.chronicle-queue.stability.conservative-mode=true
matching.chronicle-queue.stability.preallocation-size-mb=64
matching.chronicle-queue.stability.max-file-size-mb=512
matching.chronicle-queue.stability.enable-sync-fsync=false
matching.chronicle-queue.stability.sync-interval-ms=5000
matching.chronicle-queue.stability.enable-compression=false
matching.chronicle-queue.stability.enable-memory-mapping=true
matching.chronicle-queue.stability.memory-mapping-size-mb=256
matching.chronicle-queue.stability.read-cache-size-mb=64
matching.chronicle-queue.stability.enable-write-cache=true
matching.chronicle-queue.stability.write-cache-size-mb=32
matching.chronicle-queue.stability.enable-health-check=true
matching.chronicle-queue.stability.health-check-interval-seconds=30
matching.chronicle-queue.stability.enable-performance-monitoring=true
matching.chronicle-queue.stability.performance-monitoring-interval-seconds=60
matching.chronicle-queue.stability.max-retry-attempts=5
matching.chronicle-queue.stability.retry-interval-ms=2000
matching.chronicle-queue.stability.enable-backup=true
matching.chronicle-queue.stability.backup-interval-minutes=60
matching.chronicle-queue.stability.backup-retention-days=7

# 事务安全
matching.eventlog.transaction.enabled=true
matching.eventlog.checkpoint.interval-ms=5000

# 批处理同步配置
matching.batch.size=500
matching.batch.flush-interval-ms=10

# MatchEngine 限制
matching.engine.max-orders=500000
matching.disruptor.ring-buffer-size=8192

# Depth push 配置
matching.kafka.topic.depth=TRADE_DEPTH_UPDATE
matching.depth.snapshot-levels=20
matching.depth.snapshot-interval-ms=30000
matching.depth.async-queue-size=10000
matching.depth.async-workers=2

# Actuator + Prometheus
management.server.port=8081
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.show-details=always
management.metrics.tags.application=matching-engine

# 日志配置
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [%X{traceId}] [%X{symbolId}] %-5level %logger{30} - %msg%n

# 限流配置
matching.rate-limit.max-orders-per-second=50
matching.rate-limit.window-ms=1000

# 幂等性配置
matching.idempotent.ttl-seconds=3600
matching.idempotent.local-cache-size=5000
matching.idempotent.fail-strategy=FAIL_CLOSE

# 高可用(HA)配置
matching.ha.enabled=true
matching.ha.auto-failover=false
matching.ha.instance-id=${INSTANCE_ID:node-1}
matching.ha.peer-url=${PEER_URL:}
matching.ha.failover-threshold=3
matching.ha.health-check-interval-ms=1000
matching.ha.health-check-timeout-ms=3000
matching.ha.heartbeat-interval-ms=1000
matching.ha.heartbeat-timeout-ms=3000

# 健康阈值配置
matching.health.memory-threshold=0.85
matching.health.gc-threshold-ms=5000
matching.health.health-check-interval-ms=1000
matching.health.emergency-threshold=0.95
matching.health.alert-only=true

# 一致性检查
matching.consistency.checkpoint-interval-ms=1000
matching.consistency.backup-enabled=false

# Outbox 配置
matching.outbox.max-retry-queue-size=100000
matching.outbox.block-on-full-queue=true
matching.outbox.max-block-time-ms=30000
matching.outbox.failure-log-dir=/tmp/matching/failure-log
matching.outbox.emergency-queue-size=1000
matching.outbox.max-process-per-cycle=100
matching.outbox.data-sanitization.enabled=true
matching.outbox.max-log-entry-size=1000

# 线程池配置
matching.thread-pool.naming.enable-unique-naming=true
matching.thread-pool.naming.include-instance-id=true
matching.thread-pool.naming.include-timestamp=true
matching.thread-pool.monitoring.enable-stats=true
matching.thread-pool.monitoring.log-creation=false