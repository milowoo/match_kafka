# 生产环境配置 - 撮合服务专用
# 严格禁用任何可能影响延迟的自动操作

# HA监控配置 - 仅告警模式, 禁用自动故障转移
matching.health.monitoring-enabled=true
matching.health.alert-only=true
matching.health.memory-threshold=0.80
matching.health.emergency-threshold=0.90

# 禁用自动GC相关功能
matching.health.auto-gc-enabled=false
matching.health.gc-suggestion-only=true

# 监控间隔 - 生产环境适当放宽
matching.health.check-interval-ms=2000
matching.ha.health-check-interval-ms=3000

# 告警冷却时间 - 避免告警风暴
matching.health.alert-cooldown-ms=60000

# JVM参数建议 (在启动脚本中设置):
# -XX:+UseG1GC
# -XX:MaxGCPauseMillis=10
# -XX:+DisableExplicitGC
# -XX:+UnlockExperimentalVMOptions
# -XX:+UseStringDeduplication
# -Xms8g -Xmx8g
# -XX:NewRatio=1
# -XX:SurvivorRatio=8

# 监控和告警
logging.level.com.matching.ha=WARN
logging.level.com.matching.health=WARN

# 运维提醒
matching.ops.reminder=严禁在生产环境中手动触发System.gc(), 所有内存问题请通过运维工具分析处理