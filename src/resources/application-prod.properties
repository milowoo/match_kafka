# 基础服务配置
server.port=8080

# Apollo 配置 (已禁用 - Apollo 2.3.0 与 Spring Boot 3.x 不兼容)
#app.id=matching
#apollo.bootstrap.enabled=true
#apollo.bootstrap.namespaces=application
#apollo.meta=${APOLLO_META:http://apollo-meta:8080}

# Redis Sentinel配置
spring.redis.sentinel.master=${REDIS_SENTINEL_MASTER:mymaster}
spring.redis.sentinel.nodes=${REDIS_SENTINEL_NODES:redis-sentinel1:26379,redis-sentinel2:26379,redis-sentinel3:26379}
spring.redis.password=${REDIS_PASSWORD:your-strong-password}
spring.redis.jedis.pool.max-active=200
spring.redis.jedis.pool.max-idle=100
spring.redis.jedis.pool.min-idle=20

# Kafka 配置
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka1:9092,kafka2:9092,kafka3:9092}
spring.kafka.consumer.group-id=matching-engine
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.concurrency=4

# Kafka Topics
matching.kafka.topic.trade=TRADE_TOP_SYMBOL
matching.kafka.topic.result=TRADE_MATCH_RESULT
matching.kafka.topic.dlq=TRADE_MATCHING_DLQ
matching.kafka.topic.depth=TRADE_DEPTH_UPDATE

# Chronicle Queue EventLog 配置
matching.eventlog.type=chronicle-queue
matching.eventlog.dir=/data/matching/eventlog-queue
matching.eventlog.roll-cycle=HOURLY
matching.eventlog.block-size=64MB
matching.eventlog.snapshot-interval-ms=60000
matching.eventlog.transaction.enabled=true
matching.eventlog.checkpoint.interval-ms=5000
matching.kafka.topic.eventlog-sync=MATCHING_EVENTLOG_SYNC

# 高可用 (HA) 配置
matching.ha.instance-id=${INSTANCE_ID:node-1}
matching.ha.role=${INITIAL_ROLE:STANDBY}
matching.ha.peer-url=${PEER_URL:}
matching.ha.failover-threshold=3
matching.ha.health-check-interval-ms=2000
matching.ha.health-check-timeout-ms=2000

# Kafka Consumer 启动管理
matching.kafka.consumer.auto-startup=${KAFKA_AUTO_STARTUP:false}

# 数据序列化
matching.depth.use-protobuf=true
matching.eventlog.use-protobuf=true

# Outbox 配置
matching.outbox.max-retry-queue-size=500000
matching.outbox.block-on-full-queue=true
matching.outbox.max-block-time-ms=60000
matching.outbox.failure-log-dir=/data/matching/failure-log

# 批处理配置
matching.batch.size=500
matching.batch.flush-interval-ms=10

# MatchEngine 限制
matching.engine.max-orders=500000
matching.disruptor.ring-buffer-size=8192

# 深度推送配置
matching.depth.snapshot-levels=20
matching.depth.snapshot-interval-ms=5000
matching.depth.async-queue-size=10000
matching.depth.async-threads=4

# Actuator + Prometheus
management.server.port=8081
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.show-details=always
management.metrics.tags.application=matching-engine

# 日志级别
logging.level.com.matching=INFO
logging.level.com.matching.config.RedisConfig=INFO
logging.level.net.matching.openft.chronicle=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [%X{traceId}] [%X{symbolId}] %-5level %logger{36} - %msg

# 限流配置
matching.rate-limit.max-orders-per-second=100
matching.rate-limit.window-ms=1000

# 幂等性配置
matching.idempotent.ttl-seconds=3600
matching.idempotent.local-cache-size=1000000
matching.idempotent.fail-strategy=FAIL_CLOSE

# Snowflake 配置
matching.snowflake.machine-id=${MACHINE_ID:1}