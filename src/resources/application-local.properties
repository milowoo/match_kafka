server.port=8081

# Apollo
apollo.bootstrap.enabled=false

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.password=
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=8

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
matching.kafka.consumer.auto-startup=false

# Kafka topics
matching.kafka.topic.trade=TRADE_TOP_SYMBOL
matching.kafka.topic.result=TRADE_MATCH_RESULT
matching.kafka.topic.dlq=TRADE_MATCHING_DLQ
matching.kafka.topic.depth=TRADE_DEPTH_UPDATE
matching.kafka.consumer.group-id=matching-engine

# Chronicle Queue EventLog
matching.eventlog.type=chronicle-queue
matching.eventlog.dir=/tmp/matching/eventlog-queue
matching.eventlog.roll-cycle=HOURLY
matching.eventlog.transaction.enabled=true
matching.eventlog.checkpoint.interval-ms=5000

# HA
matching.ha.instance-id=node-1
matching.ha.role=STANDBY

# Protobuf
matching.depth.use-protobuf=true
matching.outbox.use-protobuf=true
matching.eventlog.use-protobuf=true

# Outbox
matching.outbox.max-retry-queue-size=100000
matching.outbox.block-on-full-queue=true
matching.outbox.max-block-time-ms=30000
matching.outbox.failure-log-dir=/tmp/matching/failure-log

# Batch sync
matching.batch.size=100
matching.batch.flush-interval-ms=50

# MatchEngine limits
matching.engine.max-orders=10000
matching.disruptor.ring-buffer-size=1024

# Depth push
matching.depth.snapshot-levels=10
matching.depth.snapshot-interval-ms=10000
matching.depth.async-queue-size=1000
matching.depth.async-threads=1

# Actuator
management.server.port=8082
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.matching=DEBUG
logging.level.com.matching.config.RedisConfig=INFO
logging.level.net.openhft.chronicle=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Snowflake
matching.snowflake.machine-id=1