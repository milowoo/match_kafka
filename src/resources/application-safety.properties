# Chronicle Queue 生产安全配置
matching.chronicle.sync-mode=SYNC
matching.chronicle.buffer-size=64KB
matching.chronicle.flush-interval=1ms

# 双写与备份
matching.chronicle.dual-write=true
matching.chronicle.backup-path=/backup/chronicle-queue

# 检查点配置
matching.checkpoint.event-interval=100
matching.checkpoint.time-interval=1000ms

# 健康检查阈值
matching.health.memory-threshold=85%
matching.health.gc-threshold=5s
matching.health.check-interval=1s

# HA自动故障转移
matching.ha.auto-failover=true
matching.ha.failover-timeout=5s
matching.ha.heartbeat-interval=1s
matching.ha.heartbeat-timeout=3s